<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CeruleanOak — Game Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f4ead0;
  --ink: #2a241e;
  --ink-2: #5e5449;
  --ink-3: #8d8377;
  --line: #3d3528;
  --note: #fbf8f1;
  --accent: #c74a24;
  --canopy: #3fb8b0;
  --grass: #8fc23e;
  --gold: #f3c95a;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--paper);
  background-image: radial-gradient(circle at 1px 1px, rgba(60,50,35,0.10) 1px, transparent 0);
  background-size: 18px 18px;
  color: var(--ink);
  min-height: 100vh;
}

/* ── Top bar ─────────────────────────────────────────────────────── */
.topbar {
  background: var(--ink); color: var(--note);
  padding: 14px 36px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1.5px solid #000;
}
.lockup {
  display: flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  text-decoration: none; color: var(--note); letter-spacing: -0.01em;
}
.nav {
  display: flex; gap: 22px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: #bfb6a4; letter-spacing: 0.1em; text-transform: uppercase;
}
.nav a { text-decoration: none; color: inherit; transition: color .15s; }
.nav a:hover { color: var(--gold); }
.nav a.active { color: var(--note); }

/* ── Layout ──────────────────────────────────────────────────────── */
.container { max-width: 1180px; margin: 0 auto; padding: 0 36px; }

/* ── Music header ─────────────────────────────────────────────────── */
.music-header { padding: 32px 0 20px; }
.music-eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);
}
.music-title {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 900;
  font-size: 56px; line-height: 0.96; margin: 4px 0 0;
}

/* ── Shelf ────────────────────────────────────────────────────────── */
.shelf-section {
  position: relative;
  padding: 40px 36px 24px;
  background: linear-gradient(180deg, #f4ead0 0%, #e8dec0 100%);
  overflow-x: auto;
}
.shelf-kicker {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
  margin-bottom: 10px;
}
.shelf-plank {
  position: relative;
  display: flex; align-items: flex-end; gap: 6px;
  padding-left: 12px; padding-bottom: 6px;
  border-bottom: 8px solid #6b5638;
  box-shadow: 0 2px 0 #3d2e1c, 0 10px 0 #4a3826;
  width: max-content; min-width: calc(100% - 0px);
}
.bookend {
  width: 8px; height: 280px; flex-shrink: 0;
  border: 1px solid #1a1410;
}
.bookend--left  { background: linear-gradient(90deg, #2a241e 0%, #3a3128 100%); }
.bookend--right { background: linear-gradient(90deg, #3a3128 0%, #2a241e 100%); margin-left: auto; }
.shelf-grain {
  position: absolute; bottom: 0; left: 0; right: 0; height: 18px;
  background: repeating-linear-gradient(90deg, #6b5638 0 30px, #5a4830 30px 32px, #6b5638 32px 80px, #6b5638 80px 84px);
  opacity: 0.5; pointer-events: none;
}

/* ── Cassette spine ───────────────────────────────────────────────── */
.cassette-spine {
  width: 56px; height: 280px; position: relative; flex-shrink: 0;
  cursor: pointer; transition: transform 180ms ease;
  font-family: 'JetBrains Mono', monospace; user-select: none;
}
.cassette-spine:hover:not(.selected) { transform: translateY(-5px); }
.cassette-spine.selected { transform: translateY(-14px); }
.spine-case {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.04) 8%, rgba(0,0,0,0.05) 50%, rgba(255,255,255,0.04) 92%, rgba(255,255,255,0.18) 100%);
  border: 1.2px solid #2a241e; border-right: 2.5px solid #2a241e;
  box-shadow: 0 3px 0 rgba(0,0,0,0.18), -1px 0 0 rgba(255,255,255,0.3) inset;
  transition: box-shadow 180ms;
}
.cassette-spine.selected .spine-case {
  box-shadow: 0 6px 0 rgba(0,0,0,0.18), -1px 0 0 rgba(255,255,255,0.4) inset;
}
.spine-hinge-1 { position: absolute; top: 6px; left: 4px; right: 4px; height: 1.5px; background: #2a241e; opacity: 0.35; pointer-events: none; }
.spine-hinge-2 { position: absolute; top: 10px; left: 4px; right: 4px; height: 1px; background: #2a241e; opacity: 0.2; pointer-events: none; }
.spine-label {
  position: absolute; top: 22px; bottom: 22px; left: 8px; right: 8px;
  background: #fbf8f1; border: 0.8px solid #2a241e;
  display: flex; flex-direction: column;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
}
.spine-color-band {
  height: 38px; border-bottom: 1px solid #2a241e;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #2a241e; letter-spacing: 0.1em;
}
.spine-title-area {
  flex: 1; writing-mode: vertical-rl; transform: rotate(180deg);
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
}
.spine-title-text { font-family: 'Kalam', cursive; font-size: 22px; color: #2a241e; font-weight: 700; line-height: 1; }
.spine-meta { font-size: 8px; color: #8d8377; letter-spacing: 0.18em; }
.spine-brand {
  height: 24px; border-top: 1px solid #c9c0a8;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; color: #8d8377; letter-spacing: 0.14em;
}
.spine-ring {
  display: none; position: absolute; top: -10px; left: -3px; right: -3px; bottom: -3px;
  border: 1.5px solid transparent; pointer-events: none;
}
.cassette-spine.selected .spine-ring { display: block; }
.spine-badge {
  display: none; position: absolute; top: -14px; left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  color: #2a241e; padding: 2px 8px;
  font-size: 8px; letter-spacing: 0.16em; font-weight: 700; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}
.cassette-spine.selected .spine-badge { display: block; }
.spine-add-slot {
  width: 56px; height: 280px; flex-shrink: 0;
  border: 1px dashed #8d8377;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: #8d8377; letter-spacing: 0.16em;
  writing-mode: vertical-rl; transform: rotate(180deg);
}

/* ── Main content ─────────────────────────────────────────────────── */
.main-grid {
  padding: 20px 0 48px;
  display: grid;
  grid-template-columns: 500px 1fr;
  gap: 28px;
  align-items: flex-start;
}
.col-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
  margin-bottom: 8px;
}

/* ── Cassette face ────────────────────────────────────────────────── */
.cassette-face {
  width: 460px; height: 290px; position: relative;
  background: #e8dec0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.04) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.03) 0, transparent 50%);
  border: 2px solid #2a241e; border-radius: 4px;
  box-shadow: 0 12px 0 rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 0 rgba(0,0,0,0.08);
  overflow: visible; flex-shrink: 0;
}
.screw {
  position: absolute; width: 10px; height: 10px;
  border-radius: 50%; background: #3a2f24;
  border: 1px solid #1a1410; box-shadow: inset -1px -1px 0 rgba(0,0,0,0.5);
}
.screw-inner {
  position: absolute; inset: 2px; background: #1a1410;
  clip-path: polygon(45% 0, 55% 0, 55% 45%, 100% 45%, 100% 55%, 55% 55%, 55% 100%, 45% 100%, 45% 55%, 0 55%, 0 45%, 45% 45%);
}
.screw-tl { top: 10px; left: 10px; }
.screw-tr { top: 10px; right: 10px; }
.screw-bl { bottom: 56px; left: 10px; }
.screw-br { bottom: 56px; right: 10px; }

.face-band {
  position: absolute; top: 28px; left: 26px; right: 26px; height: 60px;
  border: 1px solid #2a241e;
  display: flex; align-items: center; padding: 0 16px; justify-content: space-between;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.18);
}
.band-label { font-size: 9px; letter-spacing: 0.18em; color: rgba(0,0,0,0.6); font-family: 'JetBrains Mono', monospace; }
.band-title { font-family: 'Kalam', cursive; font-size: 20px; color: #2a241e; font-weight: 700; line-height: 1; margin-top: 2px; }
.band-runtime { font-family: 'Kalam', cursive; font-size: 14px; color: #2a241e; margin-top: 2px; }
.band-right { text-align: right; }

.hub-housing {
  position: absolute; top: 100px; left: 50px; right: 50px; height: 140px;
  background: #e0d6b8; border: 1px solid #2a241e;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.18), inset 0 -1px 0 rgba(255,255,255,0.25);
}
.hub-brand {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%); text-align: center;
}
.hub-brand-main { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #8d8377; letter-spacing: 0.18em; }
.hub-brand-sub { font-family: 'Kalam', cursive; font-size: 9px; color: #5e5449; margin-top: 1px; }

.reel-window {
  position: absolute; top: 32px; width: 88px; height: 88px; border-radius: 50%;
  background: radial-gradient(circle, #2a241e 0%, #1a1410 70%);
  border: 1.5px solid #1a1410; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
}
.reel-window--left  { left: 28px; }
.reel-window--right { right: 28px; }
.reel-tape  { position: absolute; inset: 6px; border-radius: 50%; background: #3a2f24; border: 1px solid #1a1410; }
.reel-wound { position: absolute; inset: 14px; border-radius: 50%; background: repeating-conic-gradient(#1a1410 0deg 18deg, #2a241e 18deg 36deg); border: 1px solid #1a1410; }
.reel-hub {
  position: absolute; inset: 26px; border-radius: 50%;
  background: #fbf8f1; border: 1px solid #1a1410;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
}
.reel-tooth {
  position: absolute; top: 50%; left: 50%;
  width: 4px; height: 14px; background: #1a1410;
}
.reel-hole {
  position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
  transform: translate(-50%,-50%); border-radius: 50%;
  background: #1a1410; border: 1px solid #000;
}
@keyframes spin-slow { to { transform: rotate(360deg); } }
@keyframes spin-fast { to { transform: rotate(360deg); } }
.playing .reel-hub--left  { animation: spin-slow 6s linear infinite; }
.playing .reel-hub--right { animation: spin-fast 4s linear infinite; }

.hub-side-label {
  position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 84px; text-align: center;
}
.hub-side-inner {
  background: #fff8df; border: 1px solid #2a241e;
  padding: 5px 4px; transform: rotate(-1.2deg); box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
}
.hub-side-text { font-family: 'Kalam', cursive; font-size: 14px; color: #2a241e; font-weight: 700; line-height: 1; }

.tape-band {
  position: absolute; bottom: 14px; left: 16px; right: 16px; height: 10px;
  background: linear-gradient(180deg, #4a3520 0%, #3a2818 50%, #4a3520 100%);
  border: 1px solid #1a1410; box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}
.wp-tab {
  position: absolute; bottom: -4px; width: 14px; height: 8px;
  background: #c9c0a8; border: 1px solid #8d8377; border-radius: 2px 2px 0 0;
}
.wp-tab--left { left: 30px; }
.wp-tab--right { right: 30px; }

/* ── Progress + transport ──────────────────────────────────────────── */
.deck-area { display: flex; flex-direction: column; gap: 10px; margin-top: 0; }

.progress-wrap {
  display: flex; align-items: center; gap: 8px; margin-top: 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3);
}
.progress-bar {
  flex: 1; height: 8px; background: #1a1410;
  border: 1px solid #000; position: relative; cursor: pointer;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.progress-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--accent); pointer-events: none;
}
@keyframes buf-pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.progress-fill.loading { animation: buf-pulse 0.7s ease-in-out infinite; }

.transport { display: flex; gap: 4px; }
.tbtn {
  flex: 1; padding: 10px 0; cursor: pointer; text-align: center;
  background: linear-gradient(180deg, #4a3f33 0%, #3a3128 50%, #2a241e 100%);
  border: 1.5px solid #000; color: #bfb6a4; user-select: none;
  box-shadow: inset 1px 1px 0 rgba(255,255,255,0.12), inset -1px -1px 0 rgba(0,0,0,0.5), 0 2px 0 rgba(0,0,0,0.3);
  transition: none;
}
.tbtn:active {
  box-shadow: inset 1px 1px 0 rgba(0,0,0,0.3), inset -1px -1px 0 rgba(255,255,255,0.06), 0 1px 0 rgba(0,0,0,0.3);
  transform: translateY(1px);
}
.tbtn.primary { background: linear-gradient(180deg, #d65a30 0%, #a83a18 100%); color: #fff8df; }
.tbtn.lit { background: linear-gradient(180deg, #3a5828 0%, #2a4018 100%); color: var(--grass); }
.tbtn-icon { font-size: 14px; line-height: 1; }
.tbtn-label { font-size: 7px; letter-spacing: 0.14em; margin-top: 3px; opacity: 0.75; font-family: 'JetBrains Mono', monospace; }

.now-line {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3);
  letter-spacing: 0.06em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.now-track { font-family: 'Kalam', cursive; font-size: 15px; color: var(--ink); }

/* ── Track list ───────────────────────────────────────────────────── */
.tracklist {
  background: #fbf8f1; border: 1.5px solid #3d3528;
  box-shadow: 4px 5px 0 rgba(0,0,0,0.08);
}
.tracklist-head {
  padding: 10px 16px; border-bottom: 1.5px solid #3d3528;
  display: flex; justify-content: space-between; align-items: center;
}
.tl-head-l { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(0,0,0,0.65); }
.tl-head-r { font-family: 'Kalam', cursive; font-size: 13px; color: rgba(0,0,0,0.65); }
.track-row {
  display: grid; grid-template-columns: 32px 1fr auto auto;
  gap: 12px; align-items: center; padding: 9px 16px; cursor: pointer;
  transition: background 0.1s;
}
.track-row:not(:last-child) { border-bottom: 1px dashed #c9c0a8; }
.track-row:hover { background: rgba(247,201,90,0.15); }
.track-row.active { background: rgba(247,201,90,0.25); }
.tr-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8d8377; }
.track-row.active .tr-num { color: var(--accent); }
.tr-name { font-family: 'Kalam', cursive; font-size: 16px; color: #2a241e; line-height: 1.1; }
.tr-tag { font-size: 9px; color: #8d8377; letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace; display: block; }
.tr-year { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #8d8377; }
.tr-dur  { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #5e5449; }
.tracklist-foot {
  border-top: 1.5px solid #3d3528; padding: 8px 16px;
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #8d8377; letter-spacing: 0.14em;
}

/* ── Liner note ───────────────────────────────────────────────────── */
.liner-note {
  margin-top: 16px; padding: 14px;
  background: #fbf8f1; border: 1.5px dashed #c9c0a8;
  font-family: 'Kalam', cursive; font-size: 14px; color: #3a2d18; line-height: 1.4;
}
.liner-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.14em; color: #8d8377; margin-bottom: 4px;
}

/* ── Footer ───────────────────────────────────────────────────────── */
.footer {
  background: var(--ink); color: #bfb6a4; border-top: 2px solid #000;
  padding: 20px 36px; display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.footer-nav { display: flex; gap: 18px; text-transform: uppercase; letter-spacing: 0.08em; }
.footer-nav a { color: inherit; text-decoration: none; transition: color .15s; }
.footer-nav a:hover { color: var(--gold); }

/* ── Mobile ───────────────────────────────────────────────────────── */
@media (max-width: 920px) {
  .container { padding: 0 16px; }
  .topbar { padding: 12px 16px; }
  .nav { display: none; }
  .music-title { font-size: 40px; }
  .main-grid { grid-template-columns: 1fr; }
  .cassette-face { width: 100%; max-width: 460px; margin: 0 auto; }
  .footer { flex-direction: column; gap: 10px; text-align: center; }
}
</style>
</head>
<body>

<header class="topbar">
  <a class="lockup" href="index.html">
    <span id="pixel-oak"></span>
    cerulean<b>oak</b>
  </a>
  <nav class="nav">
    <a href="index.html">Games</a>
    <a href="#">Devlog</a>
    <a href="music.html" class="active">Music</a>
    <a href="#">About</a>
  </nav>
</header>

<main>
  <div class="container">
    <div class="music-header">
      <div class="music-eyebrow" id="eyebrow">Foot locker · 39 tracks · 2008–2026</div>
      <div class="music-title">Game Music</div>
    </div>
  </div>

  <div class="shelf-section">
    <div class="shelf-kicker">The shelf · click a tape to load</div>
    <div class="shelf-plank" id="shelf"></div>
  </div>

  <div class="container">
    <div class="main-grid">
      <div>
        <div class="col-label" id="loaded-label">Loaded · Side A — NES</div>
        <div class="deck-area">
          <div class="cassette-face" id="cassette-face"></div>
          <div class="progress-wrap">
            <span id="time-cur">0:00</span>
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <span id="time-tot">0:00</span>
          </div>
          <div class="transport" id="transport"></div>
          <div class="now-line">♫ <span class="now-track" id="now-track">—</span></div>
        </div>
      </div>

      <div>
        <div class="col-label">j-card · track listing</div>
        <div class="tracklist" id="tracklist"></div>
        <div class="liner-note">
          <div class="liner-label">LINER NOTE</div>
          <span id="liner-text"></span>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div>© cerulean<b>oak</b> · 2026 · one dev, one room</div>
  <nav class="footer-nav">
    <a href="https://github.com/ceruleanoak" target="_blank" rel="noopener">GitHub</a>
    <a href="#">YouTube</a>
    <a href="#">Discord</a>
    <a href="/rss.xml">RSS</a>
  </nav>
</footer>


<script>
// ─── Data ──────────────────────────────────────────────────────────────────

const TAPES = [

      { title: 'Subatomic',      year: '2025', dur: '0:47', file: 'Subatomic.m4a' },
      { title: 'Fancy Fight',    year: '2025', dur: '0:45', file: 'FancyFightTest2.m4a' },
      { title: 'Boss Loop',      year: '2025', dur: '0:22', file: 'Boss Loop.m4a' },
      { title: 'Beach Comber',   year: '2025', dur: '1:03', file: 'Beach Comber.mp3' },

      { title: 'Fancy Fight 3',  year: '2025', dur: '0:25', file: 'FancyFight3.m4a' },

// ─── State ─────────────────────────────────────────────────────────────────

let tapeIdx  = 0;
let trackIdx = 0;
let playing  = false;
let looping  = false;

const audio = document.getElementById('audio-el');

// ─── Pixel oak ─────────────────────────────────────────────────────────────

(function() {
  const GRID = [
    '.....tt..tt.....','....tttttttt....','..tttttttttttt..',
    '.ttttttttttttt..', '.ttttttttttttttt','ttttttttttttttt.',
    'ttttttdkttttttt.','.tttttkktttttt..','..ttttkkttttt...',
    '...tttkkttt.....','......kkk.......', '.....kkkk.......',
    '....kkkkkk......','...gggggggg.....','..ggggggggggg...',
    '................',
  ];
  const C = { t:'#3fb8b0', d:'#2b8e88', k:'#8a6a45', g:'#8fc23e' };
  const px = 22 / 16;
  let r = '';
  GRID.forEach((row, y) => [...row].forEach((ch, x) => {

})();

// ─── Helpers ───────────────────────────────────────────────────────────────

const fmtTime = s => isNaN(s) ? '0:00' : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
const audioSrc = f => 'audio/' + encodeURIComponent(f);

// ─── Render: shelf ─────────────────────────────────────────────────────────

function renderShelf() {
  let h = `<div class="bookend bookend--left"></div>`;

    const sel = i === tapeIdx;

      <div class="spine-case"></div>

  document.getElementById('shelf').innerHTML = h;

// ─── Render: cassette face ──────────────────────────────────────────────────

function renderFace() {
  const t = TAPES[tapeIdx];
  const el = document.getElementById('cassette-face');
  el.className = 'cassette-face' + (playing ? ' playing' : '');

  const teeth = n => Array.from({length:n}).map((_,j)=>
    `<div class="reel-tooth" style="transform:translate(-50%,-50%) rotate(${j*(360/n)}deg) translateY(-12px)"></div>`

  el.innerHTML = `
    <div class="screw screw-tl"><div class="screw-inner"></div></div>
    <div class="screw screw-tr"><div class="screw-inner"></div></div>
    <div class="screw screw-bl"><div class="screw-inner"></div></div>
    <div class="screw screw-br"><div class="screw-inner"></div></div>
    <div class="face-band" style="background:${t.color}">
      <div>
        <div class="band-label">SIDE ${t.side} · ${t.tracks.length} TRK</div>
        <div class="band-title">${t.title}</div>
      </div>
      <div class="band-right">
        <div class="band-label">${t.year}</div>
        <div class="band-runtime">${t.runtime}</div>
      </div>
    </div>
    <div class="hub-housing">
      <div class="hub-brand">
        <div class="hub-brand-main">CERULEANOAK</div>
        <div class="hub-brand-sub">foot locker series · CO·90</div>
      </div>
      <div class="reel-window reel-window--left">
        <div class="reel-tape"></div><div class="reel-wound"></div>
        <div class="reel-hub reel-hub--left">${teeth(6)}<div class="reel-hole"></div></div>

      <div class="reel-window reel-window--right">

// ─── Render: transport ─────────────────────────────────────────────────────

function renderTransport() {
  const btns = [
    { icon:'⏮', label:'PREV',  fn:'prevTrack()' },
    { icon:'⏪', label:'REW',   fn:'seekRel(-10)' },
    { icon: playing?'❚❚':'▶', label: playing?'PAUSE':'PLAY', fn:'togglePlay()', primary:true },
    { icon:'■',  label:'STOP',  fn:'stopPlay()' },
    { icon:'⏩', label:'FF',    fn:'seekRel(10)' },

  ).join('');
}

// ─── Render: track list ────────────────────────────────────────────────────

function renderTracklist() {
  const t = TAPES[tapeIdx];

    const act = i === trackIdx;
    return `<div class="track-row${act?' active':''}" onclick="selectTrack(${i})">

  }).join('');

    ${rows}
    <div class="tracklist-foot">
      <span>HOME-DUBBED</span><span>STEREO · DOLBY B</span><span>CO·90</span>
    </div>`;
  document.getElementById('liner-text').textContent = t.liner;
}

// ─── Render: now playing ───────────────────────────────────────────────────

function renderNow() {
  document.getElementById('now-track').textContent = TAPES[tapeIdx].tracks[trackIdx].title;
}

// ─── Full render ───────────────────────────────────────────────────────────

function renderAll() {
  renderShelf();
  renderFace();
  renderTransport();
  renderTracklist();
  renderNow();
}

// ─── Web Audio API engine ──────────────────────────────────────────────────
// fetch → decodeAudioData → AudioBufferSourceNode.
// Files decode fully into RAM once. All subsequent plays are from buffer —
// no network involvement, no streaming pipeline, no skip-on-seek.

const actx = new (window.AudioContext || window.webkitAudioContext)();
const bufCache = new Map();  // filename → AudioBuffer
const decodeQ  = new Map();  // filename → Promise<AudioBuffer> (in-flight)

let srcNode    = null;  // current AudioBufferSourceNode
let startedAt  = 0;     // actx.currentTime when current play segment started
let pausedAt   = 0;     // seconds into track when paused
let trackDur   = 0;     // decoded buffer duration
let progTimer  = null;  // setInterval handle

function ensureCtx() {
  if (actx.state === 'suspended') actx.resume();
}

// Fetch + decode into an AudioBuffer. Returns a cached Promise if in-flight.
function getBuffer(file) {
  if (bufCache.has(file)) return Promise.resolve(bufCache.get(file));
  if (decodeQ.has(file))  return decodeQ.get(file);

  const p = fetch(audioSrc(file))
    .then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
    .then(ab => actx.decodeAudioData(ab))
    .then(buf => { bufCache.set(file, buf); decodeQ.delete(file); console.log('[decoded]', file, buf.duration.toFixed(1)+'s'); return buf; })
    .catch(e  => { decodeQ.delete(file); console.warn('[decode failed]', file, e.message); return null; });

  decodeQ.set(file, p);
  return p;
}

function prefetchAdjacent() {
  const tape     = TAPES[tapeIdx];
  const nextFile = trackIdx + 1 < tape.tracks.length
    ? tape.tracks[trackIdx + 1].file
    : tapeIdx + 1 < TAPES.length ? TAPES[tapeIdx + 1].tracks[0].file : null;
  if (nextFile) getBuffer(nextFile);
}

// Silently stop and disconnect the current source node
function killNode() {
  if (!srcNode) return;
  srcNode.onended = null;
  try { srcNode.stop(); } catch (_) {}
  srcNode.disconnect();
  srcNode = null;
}

function startProgress() {
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    if (!playing || !trackDur) return;
    const elapsed = actx.currentTime - startedAt;
    const cur = looping ? elapsed % trackDur : Math.min(elapsed, trackDur);
    const pct = cur / trackDur * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-cur').textContent = fmtTime(cur);
    document.getElementById('time-tot').textContent = fmtTime(trackDur);
    if (pct > 40) prefetchAdjacent();
  }, 200);
}

// ─── Audio actions ──────────────────────────────────────────────────────────

async function loadAndPlay(offset = 0) {
  ensureCtx();
  const file = TAPES[tapeIdx].tracks[trackIdx].file;
  document.getElementById('progress-fill').classList.add('loading');
  killNode();

  const buf = await getBuffer(file);
  document.getElementById('progress-fill').classList.remove('loading');
  if (!buf) return;

  trackDur = buf.duration;
  srcNode  = actx.createBufferSource();
  srcNode.buffer = buf;
  srcNode.loop   = looping;
  srcNode.connect(actx.destination);
  startedAt = actx.currentTime - offset;
  srcNode.start(0, offset);

  playing = true;
  renderAll();
  startProgress();

  srcNode.onended = () => {
    // Guard: onended fires on stop() too — only auto-advance at natural end
    if (playing && !looping && (actx.currentTime - startedAt) >= trackDur - 0.1) {
      playing = false;
      nextTrack();
    }
  };
}

function selectTape(i) {
  if (i === tapeIdx) return;
  stopPlay();
  tapeIdx = i; trackIdx = 0; pausedAt = 0;
  renderAll();
  getBuffer(TAPES[tapeIdx].tracks[0].file); // warm decode cache
}

function selectTrack(i) {
  trackIdx = i; pausedAt = 0;
  loadAndPlay(0);
}

function togglePlay() {
  ensureCtx();
  if (playing) {
    pausedAt = actx.currentTime - startedAt;
    killNode();
    clearInterval(progTimer);
    playing = false;
    renderAll();
  } else {
    loadAndPlay(pausedAt);
  }
}

function stopPlay() {
  killNode();
  clearInterval(progTimer);
  pausedAt = 0; playing = false;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-cur').textContent = '0:00';
  renderAll();
}

function prevTrack() {
  const was = playing;
  if (trackIdx > 0) { trackIdx--; }
  else if (tapeIdx > 0) { tapeIdx--; trackIdx = TAPES[tapeIdx].tracks.length - 1; }
  pausedAt = 0;
  if (was) { loadAndPlay(0); } else { killNode(); renderAll(); getBuffer(TAPES[tapeIdx].tracks[trackIdx].file); }
}

function nextTrack() {
  const tape = TAPES[tapeIdx], was = playing;
  if (trackIdx < tape.tracks.length - 1)  { trackIdx++; }
  else if (tapeIdx < TAPES.length - 1)    { tapeIdx++; trackIdx = 0; }
  else { stopPlay(); return; }
  pausedAt = 0;
  if (was) { loadAndPlay(0); } else { killNode(); renderAll(); getBuffer(TAPES[tapeIdx].tracks[trackIdx].file); }
}

function seekRel(s) {
  const cur    = playing ? actx.currentTime - startedAt : pausedAt;
  const newPos = Math.max(0, Math.min(trackDur || 0, cur + s));
  if (playing) { loadAndPlay(newPos); }
  else {
    pausedAt = newPos;
    document.getElementById('progress-fill').style.width = (newPos / (trackDur || 1) * 100) + '%';
    document.getElementById('time-cur').textContent = fmtTime(newPos);
  }
}

function toggleLoop() {
  looping = !looping;
  if (srcNode) srcNode.loop = looping;
  renderTransport();
}

// ─── Progress bar click ─────────────────────────────────────────────────────

document.getElementById('progress-bar').addEventListener('click', e => {
  const r      = e.currentTarget.getBoundingClientRect();
  const newPos = ((e.clientX - r.left) / r.width) * (trackDur || 0);
  if (playing) { loadAndPlay(newPos); }
  else {
    pausedAt = newPos;
    document.getElementById('progress-fill').style.width = ((newPos / (trackDur || 1)) * 100) + '%';
    document.getElementById('time-cur').textContent = fmtTime(newPos);
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────

renderAll();
getBuffer(TAPES[0].tracks[0].file); // pre-decode first track on page load
</script>
